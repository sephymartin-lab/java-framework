name: Maven Deploy to Nexus

on:
  workflow_dispatch:
    inputs:
      skip_tests:
        description: '是否跳过测试'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  notify-start:
    name: 通知开始
    runs-on: ubuntu-latest
    container:
      image: python:3-alpine
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 发送开始通知
        env:
          FEISHU_BOT_URL: ${{ secrets.FEISHU_BOT_URL }}
          FEISHU_BOT_SECRET: ${{ secrets.FEISHU_BOT_SECRET }}
          CI_REPO_NAME: ${{ github.repository }}
          CI_PIPELINE_NUMBER: ${{ github.run_number }}
          CI_COMMIT_SHA: ${{ github.sha }}
          CI_COMMIT_BRANCH: ${{ github.ref_name }}
          CI_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          CI_PIPELINE_EVENT: ${{ github.event_name }}
          CI_PIPELINE_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 scripts/ci/notify/notify_start.py
        continue-on-error: true

  maven-deploy:
    name: Maven 部署
    runs-on: ubuntu-latest
    needs: notify-start
    container:
      image: maven:3.9.12-eclipse-temurin-25-noble
      volumes:
        - /home/runner/.m2:/root/.m2
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 部署 framework-dependencies
        working-directory: framework-dependencies
        run: |
          mvn deploy -Dmaven.test.skip=${{ github.event.inputs.skip_tests || 'true' }} -B

      - name: 部署 framework-infra
        working-directory: framework-infra
        run: |
          mvn deploy -Dmaven.test.skip=${{ github.event.inputs.skip_tests || 'true' }} -B

  notify-success:
    name: 通知成功
    runs-on: ubuntu-latest
    needs: maven-deploy
    if: success()
    container:
      image: python:3-alpine
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 发送成功通知
        env:
          FEISHU_BOT_URL: ${{ secrets.FEISHU_BOT_URL }}
          FEISHU_BOT_SECRET: ${{ secrets.FEISHU_BOT_SECRET }}
          CI_REPO_NAME: ${{ github.repository }}
          CI_PIPELINE_NUMBER: ${{ github.run_number }}
          CI_COMMIT_SHA: ${{ github.sha }}
          CI_COMMIT_BRANCH: ${{ github.ref_name }}
          CI_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          CI_PIPELINE_EVENT: ${{ github.event_name }}
          CI_PIPELINE_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CI_PIPELINE_STARTED: ${{ github.event.repository.pushed_at }}
        run: |
          python3 scripts/ci/notify/notify_complete.py success
        continue-on-error: true

  notify-failure:
    name: 通知失败
    runs-on: ubuntu-latest
    needs: maven-deploy
    if: failure()
    container:
      image: python:3-alpine
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 发送失败通知
        env:
          FEISHU_BOT_URL: ${{ secrets.FEISHU_BOT_URL }}
          FEISHU_BOT_SECRET: ${{ secrets.FEISHU_BOT_SECRET }}
          CI_REPO_NAME: ${{ github.repository }}
          CI_PIPELINE_NUMBER: ${{ github.run_number }}
          CI_COMMIT_SHA: ${{ github.sha }}
          CI_COMMIT_BRANCH: ${{ github.ref_name }}
          CI_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          CI_PIPELINE_EVENT: ${{ github.event_name }}
          CI_PIPELINE_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CI_PIPELINE_STARTED: ${{ github.event.repository.pushed_at }}
        run: |
          python3 scripts/ci/notify/notify_complete.py failure
        continue-on-error: true
